name: Update GitHub Stats Cards

on:
  schedule:
    - cron: "0 0 * * *" # Runs automatically once a day at midnight
  workflow_dispatch: # Allows you to manually trigger the script

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Allows the bot to save the images to your repo

    steps:
      - uses: actions/checkout@v5

      - name: Generate GitHub Stats Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: stats
          options: 'username=${{ github.repository_owner }}&show_icons=true&theme=radical&hide_border=true'
          path: profile/stats.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Generate Top Languages Card
        uses: readme-tools/github-readme-stats-action@v1
        with:
          card: top-langs
          options: 'username=${{ github.repository_owner }}&layout=compact&theme=radical&hide_border=true'
          path: profile/top-langs.svg
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          if git diff --cached --quiet; then
            echo "No SVG changes to commit."
            exit 0
          fi
          git commit -m "chore: update GitHub stats cards"
          git push
